browser:
  headless: false
  channel: chrome
  viewport_width: 1920
  viewport_height: 1080
  locale: en-US
  accept_language: en-US,en;q=0.9
  timezone: America/New_York
  session_dir: data/sessions
  session_target: nysenate
  rotate_user_agent_per_title: true
  stealth_enabled: true
  user_agents:
    - Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/149.0.0.0 Safari/537.36
    - Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/150.0.0.0 Safari/537.36
    - Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/148.0.0.0 Safari/537.36
  args:
    - --disable-blink-features=AutomationControlled
    - --start-maximized

targets:
  root_url: https://www.nysenate.gov/legislation/laws/CONSOLIDATED
  pilot_title_limit: 1
  max_pages: 250
  max_documents: 50

files:
  output_xml: data/nysenate_consolidated_laws_pilot.xml
  log_file: logs/nysenate_crawler.log
  visited_file: data/nysenate_visited_urls.txt
  failed_file: data/nysenate_failed_urls.txt
  debug_dir: logs/nysenate_debug

timing:
  page_load_timeout_ms: 45000
  selector_timeout_ms: 8000
  navigation_delay_ms: 1000
  content_stable_delay_ms: 1200
  pre_navigation_delay_min_ms: 1000
  pre_navigation_delay_max_ms: 3000
  max_retries: 3
  retry_backoff_seconds: 2
  rate_limit_backoff_base_seconds: 15
  timeout_backoff_base_seconds: 10

selectors:
  child_links: .nys-openleg-result-item-link
  child_label: .nys-openleg-result-item-name
  child_description: .nys-openleg-result-item-description
  title_headline: .nys-openleg-result-title-headline
  title_short: .nys-openleg-result-title-short
  title_location: .nys-openleg-result-title-location
  legal_text: .nys-openleg-result-text
  revision:
    - .nys-openleg-result-revision
    - .nys-openleg-result-title-revision

debug:
  save_html_on_failure: true
  save_screenshot_on_failure: true
  save_debug_on_success: false

validation:
  min_contents_chars: 20
  require_source_url: true
  require_at_least_one_level: true
  reject_navigation_pages: true

captcha:
  capsolver_key_file: captcha key.txt
  capsolver_api_base: https://api.capsolver.com
  capsolver_proxy: ""
  capsolver_poll_interval_seconds: 2
  capsolver_timeout_seconds: 120
  capsolver_request_timeout_seconds: 30
  capsolver_preferred: true
  capsolver_log_balance_on_start: true
  capsolver_use_proxy_for_browser: true
  challenge_interaction_enabled: true
  challenge_mouse_moves: 4
  challenge_iframe_timeout_ms: 15000
  challenge_settle_ms: 10000
  challenge_cooldown_seconds: 15
