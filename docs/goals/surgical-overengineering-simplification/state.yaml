# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Surgical Overengineering Simplification"
  slug: "surgical-overengineering-simplification"
  kind: open_ended
  tranche: "Complete seven separate surgical simplification loops, each finding and fixing one overengineered repo target while preserving intended behavior."
  status: active
  oracle:
    signal: "Seven Worker receipts exist, each for one narrow overengineering target, with behavior-preserving verification, followed by a final audit that records full_outcome_complete: true."
    cadence: "after each Worker loop and at final audit"
    final_proof: "Exactly seven done Worker simplification receipts plus a Judge/PM audit mapping them to the original request."
  intake:
    original_request: "Review this repo for overengineered unintuitive code, then surgically fix seven such things one at a time with verification."
    interpreted_outcome: "The repo has seven validated, behavior-preserving simplifications that make overengineered code easier for human coders to understand."
    input_shape: vague
    audience: "human maintainers of newyork_statues_scraper"
    authority: requested
    proof_type: test
    completion_proof: "Seven surgical Worker receipts with changed files and passing tests or closest available verification, plus final full_outcome_complete audit."
    likely_misfire: "Doing broad rewrites, aesthetic cleanup, or process-heavy planning instead of seven narrow behavior-preserving simplifications."
    blind_spots_considered:
      - "Verification commands are unknown until the repo is inspected."
      - "Scraper behavior may depend on external websites or data shape."
      - "Simpler-looking code could accidentally remove intended edge-case behavior."
      - "The cleanup process itself could become overengineered."
    existing_plan_facts:
      - "Complete seven changes."
      - "Each loop should find the most triggering overengineering target at that moment."
      - "Each loop should surgically fix only that particular thing."
      - "Avoid massive rewrites and bulk changes."
      - "Test or otherwise verify behavior is preserved after each loop."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: false
    judge_picks_largest_safe_slice: false
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

